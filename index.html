<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.rbxcdn.com;" />
  <title>Roblox Account Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Account Manager</span>
      <span class="count" id="count">0 accounts</span>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="btn-bulk">Bulk add</button>
      <button class="btn" id="btn-import">Import</button>
      <button class="btn" id="btn-export">Export</button>
      <button class="btn btn-primary" id="btn-new">+ New</button>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="side-block">
        <div class="side-head">Views</div>
        <nav id="side-status"></nav>
      </div>
      <div class="side-block">
        <div class="side-head">Attributes</div>
        <nav id="side-attrs"></nav>
      </div>
      <div class="side-block side-block-tags">
        <div class="side-head">Tags</div>
        <div id="side-tags"></div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-normal" id="toolbar-normal">
          <input type="text" id="search" placeholder="Search a username or a tag…" autocomplete="off" />
          <span class="active-filter" id="active-filter"></span>
        </div>
        <div class="toolbar-bulk" id="toolbar-bulk" hidden>
          <span class="bulk-count" id="bulk-count">0 selected</span>
          <div class="bulk-sep"></div>
          <select id="bulk-status">
            <option value="">Set status…</option>
            <option value="Active">Active</option>
            <option value="Warned">Warned</option>
            <option value="Banned">Banned</option>
          </select>
          <input type="text" id="bulk-tag" placeholder="Add tag…" autocomplete="off" />
          <button class="btn" id="bulk-tag-btn">Add tag</button>
          <button class="btn btn-danger" id="bulk-delete">Delete</button>
          <span class="bulk-spacer"></span>
          <button class="btn btn-ghost" id="bulk-clear">Clear selection</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="accounts-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="check-all" title="Select all" /></th>
              <th class="col-status sortable" data-sort="status">Status<span class="sort-ind"></span></th>
              <th class="sortable" data-sort="pseudo">Username<span class="sort-ind"></span></th>
              <th class="sortable" data-sort="ageRange">Age<span class="sort-ind"></span></th>
              <th class="center sortable" data-sort="voiceChat">Voice<span class="sort-ind"></span></th>
              <th class="center sortable" data-sort="ageVerified">Verified<span class="sort-ind"></span></th>
              <th class="sortable" data-sort="bannedGames">Banned games<span class="sort-ind"></span></th>
              <th>Tags</th>
              <th class="sortable" data-sort="dateAdded">Added<span class="sort-ind"></span></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="table-empty" id="table-empty" hidden></div>
      </div>
    </main>
  </div>

  <div class="drawer-backdrop" id="backdrop" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <span class="drawer-title">Account details</span>
      <button class="icon-btn" id="drawer-close" title="Close">Close</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <template id="tpl-detail">
    <div class="detail-inner">
      <div class="detail-head">
        <img class="avatar avatar-lg" data-el="avatar" alt="" hidden />
        <input class="pseudo-field" type="text" data-field="pseudo" placeholder="Roblox username" spellcheck="false" autocomplete="off" />
        <div class="detail-head-actions">
          <button class="btn btn-ghost" data-act="copy-pseudo">Copy username</button>
          <button class="btn btn-danger" data-act="delete">Delete</button>
        </div>
      </div>

      <div class="roblox-row">
        <span class="roblox-meta" data-el="roblox-meta">No Roblox info yet.</span>
        <span class="roblox-actions">
          <button class="icon-btn" data-act="enrich">Fetch Roblox info</button>
          <button class="icon-btn" data-act="open-profile">Open profile</button>
          <button class="icon-btn" data-act="copy-combo">Copy user:pass</button>
        </span>
      </div>

      <div class="grid">
        <label class="field field-wide">
          <span class="label">Password</span>
          <div class="pw-row">
            <input class="mono" type="password" data-field="password" spellcheck="false" autocomplete="off" />
            <button class="icon-btn" data-act="toggle-pw" title="Show / hide">Show</button>
            <button class="icon-btn" data-act="copy-pw" title="Copy">Copy</button>
          </div>
        </label>

        <label class="field">
          <span class="label">Age range</span>
          <select data-field="ageRange">
            <option value="Unknown">Unknown</option>
            <option value="18-20">18-20</option>
            <option value="21+">21+</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Added on</span>
          <input type="date" data-field="dateAdded" />
        </label>

        <div class="field field-wide">
          <span class="label">Account status</span>
          <div class="segmented" data-field="status">
            <button data-value="Active">Active</button>
            <button data-value="Warned">Warned</button>
            <button data-value="Banned">Banned</button>
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Options</span>
          <div class="toggle-row">
            <label class="switch">
              <input type="checkbox" data-field="voiceChat" />
              <span class="track"></span>
              <span class="switch-label">Voice chat</span>
            </label>
            <label class="switch">
              <input type="checkbox" data-field="ageVerified" />
              <span class="track"></span>
              <span class="switch-label">Age verified</span>
            </label>
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Banned games <span class="label-hint">— type the game ID, the name is fetched</span></span>
          <div class="tag-input" data-field="bannedGames">
            <div class="tags"></div>
            <input type="text" placeholder="Game ID (e.g. 14034093693) + Enter" spellcheck="false" autocomplete="off" />
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Tags</span>
          <div class="tag-input" data-field="tags">
            <div class="tags"></div>
            <input type="text" placeholder="main, alt, farm… + Enter" spellcheck="false" autocomplete="off" />
          </div>
        </div>

        <label class="field field-wide">
          <span class="label">Notes</span>
          <textarea data-field="notes" rows="4" placeholder="Free notes…"></textarea>
        </label>
      </div>
    </div>
  </template>

  <div class="modal-backdrop" id="modal-backdrop" hidden></div>
  <div class="modal" id="bulk-modal" hidden>
    <div class="modal-head">Bulk add accounts</div>
    <div class="modal-body">
      <p class="modal-hint">One account per line as <code>username:password</code>. Space, tab or comma separators also work. A line with no separator is treated as a username only.</p>
      <textarea id="bulk-text" rows="12" spellcheck="false" placeholder="user1:password1&#10;user2:password2&#10;user3, password3"></textarea>
    </div>
    <div class="modal-foot">
      <span class="modal-hint" id="bulk-preview"></span>
      <span class="bulk-spacer"></span>
      <button class="btn btn-ghost" id="bulk-cancel">Cancel</button>
      <button class="btn btn-primary" id="bulk-add">Add accounts</button>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
