<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Roblox Account Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">Account Manager</span>
      <span class="count" id="count">0 accounts</span>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="btn-import">Import</button>
      <button class="btn" id="btn-export">Export</button>
      <button class="btn btn-primary" id="btn-new">+ New</button>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="side-block">
        <div class="side-head">Views</div>
        <nav id="side-status"></nav>
      </div>
      <div class="side-block">
        <div class="side-head">Attributes</div>
        <nav id="side-attrs"></nav>
      </div>
      <div class="side-block side-block-tags">
        <div class="side-head">Tags</div>
        <div id="side-tags"></div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search a username or a tag…" autocomplete="off" />
        <span class="active-filter" id="active-filter"></span>
      </div>
      <div class="table-wrap">
        <table class="accounts-table">
          <thead>
            <tr>
              <th class="col-status">Status</th>
              <th>Username</th>
              <th>Age</th>
              <th class="center">Voice</th>
              <th class="center">Verified</th>
              <th>Banned games</th>
              <th>Tags</th>
              <th>Added</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div class="table-empty" id="table-empty" hidden></div>
      </div>
    </main>
  </div>

  <div class="drawer-backdrop" id="backdrop" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <span class="drawer-title">Account details</span>
      <button class="icon-btn" id="drawer-close" title="Close">Close</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <template id="tpl-detail">
    <div class="detail-inner">
      <div class="detail-head">
        <input class="pseudo-field" type="text" data-field="pseudo" placeholder="Roblox username" spellcheck="false" autocomplete="off" />
        <div class="detail-head-actions">
          <button class="btn btn-ghost" data-act="copy-pseudo">Copy username</button>
          <button class="btn btn-danger" data-act="delete">Delete</button>
        </div>
      </div>

      <div class="grid">
        <label class="field field-wide">
          <span class="label">Password</span>
          <div class="pw-row">
            <input class="mono" type="password" data-field="password" spellcheck="false" autocomplete="off" />
            <button class="icon-btn" data-act="toggle-pw" title="Show / hide">Show</button>
            <button class="icon-btn" data-act="copy-pw" title="Copy">Copy</button>
          </div>
        </label>

        <label class="field">
          <span class="label">Age range</span>
          <select data-field="ageRange">
            <option value="Unknown">Unknown</option>
            <option value="18-20">18-20</option>
            <option value="21+">21+</option>
          </select>
        </label>

        <label class="field">
          <span class="label">Added on</span>
          <input type="date" data-field="dateAdded" />
        </label>

        <div class="field field-wide">
          <span class="label">Account status</span>
          <div class="segmented" data-field="status">
            <button data-value="Active">Active</button>
            <button data-value="Warned">Warned</button>
            <button data-value="Banned">Banned</button>
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Options</span>
          <div class="toggle-row">
            <label class="switch">
              <input type="checkbox" data-field="voiceChat" />
              <span class="track"></span>
              <span class="switch-label">Voice chat</span>
            </label>
            <label class="switch">
              <input type="checkbox" data-field="ageVerified" />
              <span class="track"></span>
              <span class="switch-label">Age verified</span>
            </label>
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Banned games <span class="label-hint">— type the game ID, the name is fetched</span></span>
          <div class="tag-input" data-field="bannedGames">
            <div class="tags"></div>
            <input type="text" placeholder="Game ID (e.g. 14034093693) + Enter" spellcheck="false" autocomplete="off" />
          </div>
        </div>

        <div class="field field-wide">
          <span class="label">Tags</span>
          <div class="tag-input" data-field="tags">
            <div class="tags"></div>
            <input type="text" placeholder="main, alt, farm… + Enter" spellcheck="false" autocomplete="off" />
          </div>
        </div>

        <label class="field field-wide">
          <span class="label">Notes</span>
          <textarea data-field="notes" rows="4" placeholder="Free notes…"></textarea>
        </label>
      </div>
    </div>
  </template>

  <div class="toast" id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
